name: Deploy Dashboard to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build
        working-directory: dashboard
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy to Netlify via API
        working-directory: dashboard
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DASHBOARD_SITE_ID }}
        run: |
          zip -r ../deploy.zip out/
          curl -s -X POST \
            -H "Content-Type: application/zip" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            --data-binary @../deploy.zip \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys" \
            | tee /tmp/deploy-result.json
          # Check for error in response
          if grep -q '"error"' /tmp/deploy-result.json; then
            echo "Deploy failed:"
            cat /tmp/deploy-result.json
            exit 1
          fi
          echo "Deploy successful."
          grep -o '"url":"[^"]*"' /tmp/deploy-result.json | head -1
