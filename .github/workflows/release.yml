name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Job 1: Build cross-platform binaries and publish to GitHub Releases
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Build the Windows .exe installer with Inno Setup
  windows-installer:
    runs-on: windows-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build rukkie.exe
        run: go build -ldflags="-s -w" -o rukkie.exe ./cmd/rukkie/

      - name: Copy binary into installer folder
        run: copy rukkie.exe installer\rukkie.exe

      - name: Build Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/rukkie-setup.iss
          options: /O+

      - name: Verify installer was created
        run: dir installer\output\

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/rukkie-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
