version: 2

project_name: rukkie

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/rukkie/
    binary: rukkie
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: zip
    name_template: "rukkie_{{ .Os }}_{{ .Arch }}"

release:
  github:
    owner: rukkiecodes
    name: rukkiepulse
  name_template: "v{{ .Version }}"

checksum:
  name_template: "checksums.txt"
